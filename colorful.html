<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Dashboard Study Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grid layout for the circles */
        .grid-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            justify-items: center;
        }

        /* Essential Circle Styling */
        .circle-link {
            text-decoration: none;
            display: block;
        }

        .circle-card {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-align: center;
            padding: 15px;
            border: 4px solid white;
        }

        /* Hover Effects */
        .circle-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        /* Custom Gradients for Each Block */
        .school { background: linear-gradient(135deg, #ff5400, #ff0054); }
        .college { background: linear-gradient(135deg, #00b4db, #0083b0); }
        .bed { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .main { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .upsc { background: linear-gradient(135deg, #f857a6, #ff5858); }
        .old-paper { background: linear-gradient(135deg, #f2994a, #f2c94c); }

    </style>
</head>
<body>

    <div class="container">
        <h1>Education Hub</h1>
        
        <div class="grid-sections">
            
            <!-- School Section -->
            <a href="https://example.com/school" target="_blank" class="circle-link">
                <div class="circle-card school">School</div>
            </a>

            <!-- College Section -->
            <a href="https://example.com/college" target="_blank" class="circle-link">
                <div class="circle-card college">College</div>
            </a>

            <!-- B.Ed Section -->
            <a href="https://example.com/bed" target="_blank" class="circle-link">
                <div class="circle-card bed">B.Ed</div>
            </a>

            <!-- MA/Main Section -->
            <a href="https://example.com/main" target="_blank" class="circle-link">
                <div class="circle-card main">MA / Main</div>
            </a>

            <!-- UPSC Section -->
            <a href="https://example.com/upsc" target="_blank" class="circle-link">
                <div class="circle-card upsc">UPSC</div>
            </a>

            <!-- Old Paper Section -->
            <a href="https://example.com/old-paper" target="_blank" class="circle-link">
                <div class="circle-card old-paper">Old Paper</div>
            </a>

        </div>
    </div>

</body>
</html>
